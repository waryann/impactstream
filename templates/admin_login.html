<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImpactStream — Connexion Admin</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: #090907;
            color: #ede8df;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(232, 130, 12, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(76, 175, 80, 0.05) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-15px, -10px); }
        }

        .login-card {
            position: relative;
            width: 420px;
            max-width: 92vw;
            background: linear-gradient(165deg, rgba(27, 26, 20, 0.7), rgba(14, 14, 10, 0.9));
            border: 1px solid rgba(232, 130, 12, 0.12);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(30px);
            box-shadow:
                0 30px 70px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(232, 130, 12, 0.04);
            animation: cardAppear 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .login-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }
        .login-logo img {
            height: 72px;
            width: auto;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        .login-logo h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
        }
        .login-logo h1 span { color: #e8820c; }
        .login-logo p {
            font-size: 0.85rem;
            color: rgba(237, 232, 223, 0.4);
            margin-top: 0.3rem;
        }

        .login-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #e8820c, #4caf50);
            border-radius: 2px;
            margin: 0 auto 2rem;
        }

        .login-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(237, 232, 223, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }
        .login-label svg { color: #e8820c; }

        .login-input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(27, 26, 20, 0.8);
            border: 1px solid rgba(62, 59, 46, 0.3);
            border-radius: 14px;
            color: #ede8df;
            font-size: 1.05rem;
            font-family: inherit;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-align: center;
            outline: none;
            transition: all 0.35s ease;
        }
        .login-input::placeholder {
            color: rgba(237, 232, 223, 0.2);
            letter-spacing: 0.05em;
        }
        .login-input:focus {
            border-color: rgba(232, 130, 12, 0.5);
            box-shadow: 0 0 0 4px rgba(232, 130, 12, 0.08), 0 0 30px rgba(232, 130, 12, 0.05);
            background: rgba(27, 26, 20, 1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1.5rem;
            background: linear-gradient(135deg, #e8820c, #d4770a);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(232, 130, 12, 0.3);
            letter-spacing: 0.03em;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(232, 130, 12, 0.45);
            background: linear-gradient(135deg, #f59312, #e8820c);
        }
        .login-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .flash-error {
            background: rgba(220, 53, 69, 0.12);
            border: 1px solid rgba(220, 53, 69, 0.25);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.85rem;
            color: #ff6b6b;
            text-align: center;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(237, 232, 223, 0.3);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .back-link:hover { color: #e8820c; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="/static/images/logo.png" alt="Ministère Apostolique Impact">
            <h1>Impact<span>Stream</span></h1>
            <p>Espace Administration</p>
        </div>

        <div class="login-divider"></div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                {% if category == 'error' %}
                    <div class="flash-error">🔒 {{ message }}</div>
                {% endif %}
            {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}" autocomplete="off">
            <div class="login-label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                Code d'accès
            </div>
            <input type="password" name="code" class="login-input" placeholder="• • • • • • • • • •" autofocus required id="login-code-input">

            <button type="submit" class="login-btn" id="login-submit-btn">
                Accéder à l'espace admin
            </button>
        </form>

        <a href="/" class="back-link">← Retour au site</a>
    </div>
</body>
</html>
